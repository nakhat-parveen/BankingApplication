server.port=8080
spring.application.name=api-gateway

# Eureka - to register and discover services
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Route 1: Customer registration -> BankApplication
spring.cloud.gateway.routes[0].id=customer-registration
spring.cloud.gateway.routes[0].uri=lb://bank-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/Registration/**

# Route 2: Account to account transfers -> BankApplication (no Feign involved)
spring.cloud.gateway.routes[1].id=bank-transaction
spring.cloud.gateway.routes[1].uri=lb://bank-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/transaction/**

# Route 3: Phone number / GPay payments -> PaymentSystem
# PaymentSystem then internally calls BankApplication via Feign Client
# to process the actual fund transfer
spring.cloud.gateway.routes[2].id=payment-gpay
spring.cloud.gateway.routes[2].uri=lb://payment-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/gpay/**

logging.level.org.springframework.cloud.gateway=DEBUG